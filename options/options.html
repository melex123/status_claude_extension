<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Claude Monitor — Settings</title>
  <link rel="stylesheet" href="options.css">
</head>
<body>
  <div class="container">
    <div class="header-hero">
      <img class="hero-icon" src="../icons/icon128.png" alt="Claude">
      <h1>Settings</h1>
    </div>

    <!-- Refresh Interval -->
    <div class="card">
      <h2>Refresh Interval</h2>
      <p class="desc">How often to fetch usage and status data</p>
      <select id="refreshInterval">
        <option value="1">Every 1 minute</option>
        <option value="2">Every 2 minutes</option>
        <option value="5" selected>Every 5 minutes</option>
        <option value="10">Every 10 minutes</option>
        <option value="15">Every 15 minutes</option>
        <option value="30">Every 30 minutes</option>
      </select>
    </div>

    <!-- Notifications -->
    <div class="card">
      <h2>Notifications</h2>
      <p class="desc">Get notified when usage approaches limits</p>

      <div class="toggle-row">
        <label for="notifEnabled">Enable notifications</label>
        <input type="checkbox" id="notifEnabled" checked>
      </div>

      <div id="thresholdSettings">
        <div class="threshold-group">
          <label>Warning threshold</label>
          <div class="input-row">
            <input type="number" id="threshold1" min="1" max="100" value="80">
            <span class="unit">%</span>
          </div>
        </div>
        <div class="threshold-group">
          <label>Critical threshold</label>
          <div class="input-row">
            <input type="number" id="threshold2" min="1" max="100" value="95">
            <span class="unit">%</span>
          </div>
        </div>
      </div>
    </div>

    <!-- Background Color -->
    <div class="card">
      <h2>Background Color</h2>
      <p class="desc">Customize the popup background color</p>
      <div class="color-presets">
        <button class="color-swatch active" data-color="#0d0d1a" style="background:#0d0d1a" title="Default Dark"></button>
        <button class="color-swatch" data-color="#0a0a0a" style="background:#0a0a0a" title="Pure Dark"></button>
        <button class="color-swatch" data-color="#1a1a2e" style="background:#1a1a2e" title="Navy"></button>
        <button class="color-swatch" data-color="#1a0a2e" style="background:#1a0a2e" title="Purple"></button>
        <button class="color-swatch" data-color="#0a1a1a" style="background:#0a1a1a" title="Teal"></button>
        <button class="color-swatch" data-color="#1a1a0a" style="background:#1a1a0a" title="Olive"></button>
        <button class="color-swatch" data-color="#1a0a0a" style="background:#1a0a0a" title="Wine"></button>
        <button class="color-swatch" data-color="custom" style="background:conic-gradient(red,yellow,lime,aqua,blue,magenta,red)" title="Custom"></button>
      </div>
      <div id="customColorRow" class="custom-color-row hidden">
        <input type="color" id="customColor" value="#0d0d1a">
        <span id="customColorHex" class="color-hex">#0d0d1a</span>
      </div>
      <div class="color-preview" id="colorPreview">
        <div class="preview-bar">
          <span style="color:#d97706;font-weight:600;font-size:11px;">5-Hour Limit</span>
          <div style="background:#1e1e3a;border-radius:3px;height:6px;flex:1;margin-left:8px;overflow:hidden;">
            <div style="background:#d97706;width:60%;height:100%;border-radius:3px;"></div>
          </div>
        </div>
      </div>
    </div>

    <!-- Organization -->
    <div class="card" id="orgCard">
      <h2>Organization</h2>
      <p class="desc">Select which Claude organization to monitor</p>
      <select id="orgSelector">
        <option value="">Auto-detect</option>
      </select>
    </div>

    <!-- Save -->
    <div class="actions">
      <button id="saveBtn" class="btn-primary">Save Settings</button>
      <span id="saveStatus" class="save-status"></span>
    </div>
  </div>

  <script src="options.js"></script>
</body>
</html>
